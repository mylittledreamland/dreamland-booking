<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Session — My Little Dreamland</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Bảng màu kem sữa cao cấp phối hợp Pastel kẹo ngọt */
  :root {
    --cream: #FAF8F4;       /* Nền kem sữa tinh tế gốc, hoàn toàn không bị chói */
    --white: #FFFFFF;
    --ink: #1A1714;
    --ink-soft: #6B6560;
    --ink-faint: #EAE6E0;
    
    --sage: #ffadad;         /* Màu hồng dâu pastel ngọt ngào của cậu */
    --sage-light: #fff0f0;   /* Hồng siêu nhẹ khi hover */
    --sage-dark: #ff8fa3;    /* Hồng đậm khi chọn hẳn */
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body {
    background-color: var(--cream) !important;
  }

  body {
    font-family: 'Fredoka', sans-serif !important; /* Áp dụng font chữ mập tròn siêu cưng */
    font-size: 14px;
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Tiêu đề */
  .header-title, .card-title, .success-title {
    font-family: 'Fredoka', sans-serif !important;
    font-weight: 700;
    color: var(--ink);
  }

  /* Cục số 1-2-3 màu Xanh Dương Pastel theo đúng gu của cậu */
  .step .step-num {
    font-family: 'Fredoka', sans-serif !important;
    border: 1.5px solid #bdb2ff !important; /* Viền tím xanh nhạt */
    color: #a0c4ff !important;              /* Số màu xanh dương pastel */
    background: var(--white) !important;
  }
  .step.active .step-num {
    background: #a0c4ff !important;         /* Xanh dương khi active */
    border-color: #a0c4ff !important;
    color: white !important;
  }
  .step.done .step-num {
    background: #caffbf !important;         /* Khi hoàn thành đổi sang Xanh Lá pastel */
    border-color: #caffbf !important;
    color: #4A7259 !important;
  }
  .step.active .step-label {
    color: #a0c4ff !important;
    font-weight: 600;
  }
  .step-line {
    background: #bdb2ff !important;         /* Thanh nối màu tím pastel nhạt */
  }

  /* Header */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--ink-faint);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--sage-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .header-title { font-size: 17px; }
  .header-sub { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }

  /* Container */
  .container { max-width: 560px; margin: 0 auto; padding: 0 20px; }

  /* Steps indicator */
  .steps { display: flex; align-items: center; gap: 0; padding: 28px 0 24px; }
  .step { display: flex; align-items: center; gap: 8px; flex: 1; }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    flex-shrink: 0;
  }
  .step-label { font-size: 11px; color: var(--ink-soft); }
  .step-line { flex: 1; height: 1px; margin: 0 8px; max-width: 40px; }

  /* Cards */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid #EAE6E0;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-title { font-size: 20px; margin-bottom: 6px; }
  .card-sub { font-size: 12px; color: var(--ink-soft); margin-bottom: 20px; line-height: 1.5; }

  /* Date picker */
  .date-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--ink-faint);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    background: var(--white);
    cursor: pointer;
    outline: none;
    appearance: none;
  }
  .date-input:focus { 
    border-color: #ffd6a5 !important; 
    box-shadow: 0 0 0 3px #fff1e0 !important;
  }

  /* Form Fields */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: bold; color: var(--ink); margin-bottom: 6px; }
  .field input, .field select {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--ink-faint);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    background: var(--white);
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--sage) !important; }
  .field input::placeholder { color: var(--ink-faint); }

  /* Slot grid */
  .slots-loading { text-align: center; padding: 32px; color: var(--ink-soft); font-size: 13px; }
  .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 4px; }
  
  .slot-btn {
    padding: 12px 8px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--ink-faint);
    background: var(--white);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .slot-time { font-size: 13px; font-weight: bold; color: var(--ink); display: block; }
  .slot-avail { font-size: 11px; margin-top: 3px; display: block; color: var(--ink-soft); }
  
  /* Nút bấm giờ màu hồng dâu ngọt ngào của cậu */
  .slot-btn.available {
    border-color: #ffadad !important;
    background: #fff5f5 !important;
  }
  .slot-btn.available:hover {
    background: var(--sage-light) !important;
  }
  .slot-btn.available:hover .slot-time { color: var(--sage-dark) !important; }
  
  /* Khi được bấm chọn */
  .slot-btn.selected {
    border-color: var(--sage-dark) !important;
    background: var(--sage) !important;
  }
  .slot-btn.selected .slot-time { color: white !important; }
  .slot-btn.selected .slot-avail { color: rgba(255,255,255,0.9) !important; }
  
  /* Sắp hết vé màu cam đào */
  .slot-btn.almost {
    border-color: #ffd6a5 !important;
    background: #fffdfa !important;
  }
  .slot-btn.almost .slot-avail { color: #d35400 !important; }
  
  /* Hết chỗ */
  .slot-btn.full {
    border-color: var(--ink-faint) !important;
    background: #F5F4F2 !important;
    cursor: not-allowed;
    opacity: 0.5;
  }
  .slot-btn.full .slot-time { color: var(--ink-soft) !important; }
  .slot-btn.full .slot-avail { color: var(--ink-faint) !important; }
  .slot-btn.past { display: none; }

  /* Tóm tắt thông tin bước 2 */
  .slot-summary {
    background: var(--sage-light) !important;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .slot-summary-icon { font-size: 18px; }
  .slot-summary-text { font-size: 12px; line-height: 1.4; }
  .slot-summary-main { font-weight: bold; color: var(--sage-dark) !important; }
  .slot-summary-sub { color: var(--ink-soft); }

  /* Nút bấm chính */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary {
    background: var(--sage
