<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Session — My Little Dreamland</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF8F4;
    --white: #FFFFFF;
    --ink: #1A1714;
    --ink-soft: #6B6560;
    --ink-faint: #C8C3BC;
    --sage: #ffadad;         /* Hồng pastel dễ thương cho nút bấm */
    --sage-light: #fff5f5;   /* Hồng nhạt khi hover */
    --sage-dark: #ff8fa3;    /* Hồng đậm khi chọn hẳn */
    --radius: 14px;
    --radius-sm: 8px;
  }

  html { background: var(--cream); }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--cream);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Header */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--ink-faint);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--sage-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .header-title {
    font-size: 17px;
    font-weight: bold;
    color: var(--ink);
  }
  .header-sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 1px;
  }

  /* Container */
  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Steps indicator */
  .steps {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 28px 0 24px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--ink-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    background: var(--white);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .step-label {
    font-size: 12px;
    color: var(--ink-soft);
    transition: color 0.2s;
  }
  .step-line {
    flex: 1;
    height: 1px;
    background: var(--ink-faint);
    margin: 0 8px;
    max-width: 40px;
  }
  .step.active .step-num {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
  }
  .step.active .step-label { color: var(--ink); font-weight: bold; }
  .step.done .step-num {
    background: var(--sage-light);
    border-color: var(--sage);
    color: var(--sage-dark);
  }

  /* Cards */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid #EAE6E0;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 6px;
  }
  .card-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* Date picker */
  .date-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--ink-faint);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    background: var(--white);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }
  .date-input:focus { border-color: var(--sage); }

  /* Slot grid */
  .slots-loading {
    text-align: center;
    padding: 32px;
    color: var(--ink-soft);
    font-size: 13px
