<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Session — My Little Dreamland</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');
  
  html, body {
    margin: 0; padding: 0; width: 100%; min-height: 100vh;
    background: linear-gradient(135deg, rgba(255,173,173,0.3) 0%, rgba(255,214,165,0.3) 20%, rgba(253,255,182,0.3) 40%, rgba(202,255,191,0.3) 60%, rgba(155,246,255,0.3) 80%, rgba(160,196,255,0.3) 100%) fixed !important;
    position: relative; overflow-x: hidden;
  }
  body::before {
    content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10 L32 26 L48 28 L32 30 L30 46 L28 30 L12 28 L28 26 Z' fill='rgba(255,255,255,0.9)'/%3E%3C/svg%3E");
    background-size: 120px 120px; z-index: -1; pointer-events: none; animation: twinkle 3s infinite alternate;
  }
  body::after {
    content: ""; position: fixed; top: 30px; left: 30px; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 15 L31.5 28.5 L45 30 L31.5 31.5 L30 45 L28.5 31.5 L15 30 L28.5 28.5 Z' fill='rgba(255,255,255,0.7)'/%3E%3C/svg%3E");
    background-size: 180px 180px; z-index: -1; pointer-events: none; animation: twinkle 4s infinite alternate-reverse;
  }
  @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

  :root { --white: #FFFFFF; --ink: #1A1714; --ink-soft: #6B6560; --ink-faint: #C8C3BC; --sage: #7A9E87; --sage-light: #EDF3EF; --sage-dark: #4A7259; --radius: 14px; --radius-sm: 8px; }
  body { font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--ink); padding: 0 0 60px; }
  .header { background: var(--white); border-bottom: 1px solid var(--ink-faint); padding: 18px 24px; display: flex; align-items: center; gap: 12px; }
  .container { max-width: 560px; margin: 0 auto; padding: 0 20px; }
  .card { background: var(--white); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
  .btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--sage); color: white; }
  .screen { display: none; } .screen.active { display: block; }
  .hour-btn { width: 100%; padding: 15px; margin: 5px 0; background: white; border: 1px solid #ccc; cursor: pointer; }
  .sub-slots { display: none; flex-direction: column; padding: 10px; background: #f9f9f9; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🌈</div>
  <div><div class="header-title">My Little Dreamland</div></div>
</div>

<div class="container">
  <div id="slots-container"></div>
  <div class="screen active" id="screen-1">
    <div id="slots-container"></div>
  </div>
</div>

<script>
  const API_URL = "DÁN_LINK_WEB_APP_URL_Ở_ĐÂY";

  async function loadSlots() {
    const res = await fetch(`${API_URL}?action=getSlots&date=2026-06-16`);
    const data = await res.json();
    const container = document.getElementById('slots-container');
    
    data.groupedSlots.forEach(group => {
      const groupDiv = document.createElement('div');
      groupDiv.innerHTML = `<button class="hour-btn">${group.hourLabel}</button>`;
      const sub = document.createElement('div');
      sub.className = 'sub-slots';
      
      groupDiv.querySelector('button').onclick = () => {
        sub.style.display = sub.style.display === 'flex' ? 'none' : 'flex';
      };

      group.subSlots.forEach(s => {
        sub.innerHTML += `<div class="slot-item">${s.start} - ${s.end}</div>`;
      });
      groupDiv.appendChild(sub);
      container.appendChild(groupDiv);
    });
  }
  loadSlots();
</script>
</body>
</html>
